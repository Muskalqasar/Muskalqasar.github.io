<!DOCTYPE html>  <html>  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  <title>MUSK AL QASAR</title>  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>  <style>  
body{margin:0;font-family:sans-serif;background:#0b0b0b;color:#fff}  
.header{background:#000;padding:15px;display:flex;justify-content:space-between;align-items:center}  
.gold{color:#b8860b}  
.btn{background:#b8860b;color:#000;padding:8px;border:none;cursor:pointer;margin:2px}  
.box{background:#111;margin:10px;padding:15px;border-radius:10px}  
input,textarea{width:100%;padding:8px;margin:5px 0;background:#000;color:#fff;border:1px solid #333}  
.hidden{display:none}  
.product{border-bottom:1px solid #333;padding:10px 0}  
</style>  </head>  <body>  <div class="header">  
<h2 class="gold">MUSK AL QASAR</h2>  
<div>  
<button class="btn" onclick="lang('en')">EN</button>  
<button class="btn" onclick="lang('ur')">UR</button>  
<button class="btn" onclick="openAdmin()">ADMIN</button>  
</div>  
</div>  <!-- PRODUCTS -->  <div class="box">  
<div class="product">  
<h3>Oud Royal - Rs 2500</h3>  
<button class="btn" onclick="add('Oud Royal',2500)">Add</button>  
</div>  <div class="product">  
<h3>Musk Gold - Rs 1800</h3>  
<button class="btn" onclick="add('Musk Gold',1800)">Add</button>  
</div>  
</div>  <!-- CART -->  <div class="box">  
<h3 id="cartTitle">Cart</h3>  
<div id="cart"></div>  
<h3 id="total"></h3>  <input id="name" placeholder="Name">  
<input id="phone" placeholder="Phone">  
<textarea id="address" placeholder="Address"></textarea>  <button class="btn" onclick="order()">Cash on Delivery</button>

</div>  <!-- LOGIN -->  <div id="login" class="box hidden">  
<h3>Admin Login</h3>  
<input id="pass" placeholder="Password">  
<button class="btn" onclick="login()">Login</button>  
</div>  <!-- ADMIN -->  <div id="admin" class="box hidden">  
<h3>LIVE ORDERS</h3>  
<div id="orders"></div>  
</div>  <script>  
  
// ================= FIREBASE =================  
const firebaseConfig = {  
apiKey: "YOUR_KEY",  
authDomain: "YOUR_DOMAIN",  
projectId: "YOUR_ID"  
};  
  
firebase.initializeApp(firebaseConfig);  
const db = firebase.firestore();  
  
// ================= SECURITY =================  
const ADMIN_PASS = "1234";  
  
// ================= CART =================  
let cart=[];  
  
function add(n,p){  
let f=cart.find(x=>x.name===n);  
if(f){f.qty++}else{cart.push({name:n,price:p,qty:1})}  
render();  
}  
  
function change(n,v){  
let f=cart.find(x=>x.name===n);  
f.qty+=v;  
if(f.qty<=0) cart=cart.filter(x=>x.name!==n);  
render();  
}  
  
function render(){  
let h=""; let t=0;  
  
cart.forEach(x=>{  
t+=x.price*x.qty;  
h+=`  
<div>  
${x.name} x${x.qty}  
<button onclick="change('${x.name}',-1)">-</button>  
<button onclick="change('${x.name}',1)">+</button>  
</div>`;  
});  
  
cartDiv.innerHTML=h;  
total.innerText="Total: Rs "+t;  
}  
  
// ================= ORDER =================  
function order(){  
  
let name=name.value;  
let phone=phone.value;  
let address=address.value;  
  
if(!name||!phone||!address||cart.length===0){  
alert("Fill all fields");  
return;  
}  
  
db.collection("orders").add({  
name,phone,address,  
cart,  
status:"Pending",  
time:Date.now()  
});  
  
alert("Order Placed (COD)");  
  
cart=[];  
render();  
}  
  
// ================= ADMIN =================  
function openAdmin(){  
login.classList.remove("hidden");  
}  
  
function login(){  
if(pass.value===ADMIN_PASS){  
login.classList.add("hidden");  
admin.classList.remove("hidden");  
loadOrders();  
}else{  
alert("Wrong password");  
}  
}  
  
function loadOrders(){  
  
db.collection("orders").orderBy("time","desc")  
.onSnapshot(snap=>{  
  
let h="";  
  
snap.forEach(doc=>{  
let o=doc.data();  
  
let items="";  
o.cart.forEach(i=>{  
items+=i.name+" x"+i.qty+"<br>";  
});  
  
h+=`  
<div class="box">  
<b>${o.name}</b><br>  
${o.phone}<br>  
${o.address}<br><br>  
${items}  
Status: ${o.status}<br>  
</div>  
`;  
});  
  
orders.innerHTML=h;  
  
});  
}  
  
// ================= LANGUAGE =================  
function lang(l){  
if(l==="ur"){  
cartTitle.innerText="ٹوکری";  
}else{  
cartTitle.innerText="Cart";  
}  
}  
  
</script>  </body>  
</html>
