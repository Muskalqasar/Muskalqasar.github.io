<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muskalqasar</title>

<style>
body{
font-family: Arial;
margin:0;
background:#000;
color:#fff;
}

header{
display:flex;
justify-content:space-between;
padding:15px;
background:#111;
}

a{
color:gold;
text-decoration:none;
cursor:pointer;
}

.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.card{
background:#1a1a1a;
padding:15px;
margin:10px;
width:200px;
text-align:center;
border-radius:10px;
}

img{
width:100%;
border-radius:10px;
}

button{
background:gold;
border:none;
padding:10px;
cursor:pointer;
margin-top:10px;
}

input{
display:block;
margin:10px auto;
padding:10px;
width:80%;
}

.page{
display:none;
padding:10px;
}

.active{
display:block;
}

@media(max-width:600px){
.products{
flex-direction:column;
align-items:center;
}
}
</style>
</head>

<body>

<header>
<h2>Muskalqasar</h2>
<div>
<a onclick="showPage('home')">Home</a> |
<a onclick="showPage('cart')">Cart (<span id="count">0</span>)</a>
</div>
</header>

<!-- HOME -->
<div id="home" class="page active">
<div class="products">

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Oud Royal</h3>
<p>Rs 2500</p>
<button onclick="addToCart('Oud Royal',2500)">Add</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Amber Night</h3>
<p>Rs 3000</p>
<button onclick="addToCart('Amber Night',3000)">Add</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Musk Gold</h3>
<p>Rs 2800</p>
<button onclick="addToCart('Musk Gold',2800)">Add</button>
</div>

</div>
</div>

<!-- CART -->
<div id="cart" class="page">
<h2>Your Cart</h2>
<div id="cartItems"></div>
<h3>Total: Rs <span id="total">0</span></h3>
<button onclick="showPage('checkout')">Checkout</button>
</div>

<!-- CHECKOUT -->
<div id="checkout" class="page">
<h2>Checkout</h2>

<p>Send payment to JazzCash:</p>
<p><b>03228110393</b></p>

<input type="text" id="name" placeholder="Your Name">
<input type="text" id="address" placeholder="Your Address">

<button onclick="placeOrder()">Place Order</button>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function saveCart(){
localStorage.setItem("cart", JSON.stringify(cart));
updateCount();
}

function addToCart(name, price){
cart.push({name, price});
saveCart();
alert("Added to cart");
}

function updateCount(){
document.getElementById("count").innerText = cart.length;
}

function showPage(page){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(page).classList.add("active");

if(page==="cart") loadCart();
}

function loadCart(){
let container = document.getElementById("cartItems");
let total = 0;
container.innerHTML="";

cart.forEach((item,index)=>{
total += item.price;

container.innerHTML += `
<div>
${item.name} - Rs ${item.price}
<button onclick="removeItem(${index})">X</button>
</div>
`;
});

document.getElementById("total").innerText = total;
}

function removeItem(i){
cart.splice(i,1);
saveCart();
loadCart();
}

function placeOrder(){
let name = document.getElementById("name").value;
let address = document.getElementById("address").value;

if(name==="" || address===""){
alert("Fill all fields");
return;
}

let order = {
name,
address,
cart
};

localStorage.setItem("lastOrder", JSON.stringify(order));

cart=[];
saveCart();

alert("Order placed! Send payment to 03228110393 (JazzCash)");
showPage('home');
}

updateCount();
</script>

</body>
</html>
